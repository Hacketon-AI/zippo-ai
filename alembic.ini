# Alembic config for personal-ai-assistant
# DATABASE_URL is read from the environment at runtime by env.py.
# Do not hardcode credentials here.

[alembic]
# Path to the migrations directory (relative to this file).
script_location = api/app/db/migrations

# Use OS-style path separator.
prepend_sys_path = .

# Template for new revision filenames: <UTC timestamp>_<slug>.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(slug)s

# Timezone for revision timestamps.
timezone = UTC

# Truncate slug length.
truncate_slug_length = 40

# Intentionally left blank; URL is set in env.py from DATABASE_URL.
sqlalchemy.url =


[post_write_hooks]
# No post-write hooks configured.


# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

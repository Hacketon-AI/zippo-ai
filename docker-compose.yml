services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: personal-ai-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - qdrant
      - ollama
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: personal-ai-postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Bind to localhost only; do not expose publicly
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: personal-ai-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    # Bind to localhost only
    ports:
      - "127.0.0.1:6333:6333"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: personal-ai-ollama
    volumes:
      - ollama_data:/root/.ollama
    # Internal-only: do NOT publish ports to host/public
    expose:
      - "11434"
    restart: unless-stopped

  # Optional: Open WebUI (uncomment to enable)
  # open-webui:
  #   image: ghcr.io/open-webui/open-webui:main
  #   container_name: personal-ai-open-webui
  #   environment:
  #     - OLLAMA_BASE_URL=http://ollama:11434
  #   volumes:
  #     - open_webui_data:/app/backend/data
  #   ports:
  #     - "127.0.0.1:3000:8080"
  #   depends_on:
  #     - ollama
  #   restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  ollama_data:
  # open_webui_data:
